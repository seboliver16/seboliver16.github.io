  <script>
  // ---- Word Sea ----
  (function () {
    const sea = document.getElementById('wordSea');
    if (!sea) return;

    const words = ['TECH', 'AI', 'STARTUPS', 'BUILDER', 'SHIPPING', 'FOUNDER', 'INVESTING', 'PODCAST', 'NYC', 'SCALE', 'SHIP', 'BUILD', 'CODE', 'LAUNCH'];
    const ROWS = 20;
    let resizeTimer;

    function buildWordSea() {
      sea.innerHTML = '';
      const w = window.innerWidth;
      // Spread columns evenly across the full viewport
      const colCount = Math.max(3, Math.ceil(w / 150));
      const colW = w / colCount;

      for (let c = 0; c < colCount; c++) {
        const col = document.createElement('div');
        col.className = 'word-sea-col';
        col.style.left = ((c / colCount) * 100) + '%';
        col.style.width = colW + 'px';

        const speed = 300 + Math.random() * 200;
        col.style.animationDuration = speed + 's';
        col.style.animationDelay = -(Math.random() * speed) + 's';

        let text = '';
        for (let r = 0; r < ROWS; r++) {
          const word = words[Math.floor(Math.random() * words.length)];
          text += word.split('').join('\n') + '\n\n';
        }
        col.textContent = text + text;
        sea.appendChild(col);
      }
    }

    buildWordSea();
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(buildWordSea, 300);
    });
  })();
  </script>
