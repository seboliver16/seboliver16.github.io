      - generic [ref=e200]:
        - heading "Blog" [level=4] [ref=e202]
        - generic [ref=e205]:
          - generic [ref=e206]:
            - generic [ref=e210]:
              - link "Die Grotesk design information" [ref=e211] [cursor=pointer]:
                - /url: /blog/die-grotesk-design-information/
              - generic [ref=e212]:
                - paragraph
                - paragraph [ref=e213]: Die Grotesk was shaped in the long shadow of Helvetica, a typeface both revered and resented in equal measure. Graphic designers love it. Type designers hate it. Endlessly revived and resold, simultaneously banal and sublime, its forms feel inevitable. A typeface so familiar it feels like air.
                - paragraph
            - generic [ref=e217]:
              - link "Family design information" [ref=e218] [cursor=pointer]:
                - /url: /blog/family-design-information/
              - generic [ref=e219]:
                - paragraph
                - paragraph [ref=e220]: Family is an everyday typeface based on Clearface. As an extension of its lineage, Family keeps Clearface’s easy-going curves and idiosyncrasies, while updating it for modern use.
                - paragraph
          - generic [ref=e221]:
            - generic [ref=e225]:
              - link "American Grotesk design information" [ref=e226] [cursor=pointer]:
                - /url: /blog/american-grotesk-design-information/
              - generic [ref=e227]:
                - paragraph
                - paragraph [ref=e228]: American Grotesk® is a reprisal of Franklin Gothic, which has staked its place as a key part of American graphic vernacular history, notably in persuasive communication. American Grotesk® appears in a time when truths, half-truths, lies, fiction, or entertainment seem interchangeable, resulting in a culture of personal truths.
                - paragraph
            - generic [ref=e232]:
              - link "The Future design information" [ref=e233] [cursor=pointer]:
                - /url: /blog/the-future-design-information/
              - generic [ref=e234]:
                - paragraph
                - paragraph [ref=e235]: The Future is a homage to Futura, Paul Renner’s progressive classic. Working from original production drawings, The Future is a careful observation of Futura’s geometric architecture and avant-garde alternates.
                - paragraph
          - generic [ref=e236]:
            - generic [ref=e240]:
              - link "Martina Plantijn design information" [ref=e241] [cursor=pointer]:
                - /url: /blog/martina-plantijn-design-information/
              - generic [ref=e242]:
                - paragraph
                - paragraph [ref=e243]: Martina Plantijn is a better Plantin. Informed by the workhorse qualities of Frank Hinman Pierpont’s typeface and expanding upon his research of 16th century type at the Plantin-Moretus Museum in Antwerp, Martina Plantijn makes decisive digital updates across its roman and italic cuts.
                - paragraph
            - generic [ref=e247]:
              - link "Font licence updates" [ref=e248] [cursor=pointer]:
                - /url: /blog/eula-updates-desktop-broadcasting-advertising-oem/
              - generic [ref=e249]:
                - paragraph
                - paragraph [ref=e250]: A summary of our new EULAs for advertising, broadcasting and OEM and changes to the desktop EULA to include sharing.
                - paragraph
